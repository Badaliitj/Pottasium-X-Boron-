<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body class="midnight-page">

<nav>

<!-- Password Screen -->

<div id="letter-password-screen">

<div class="password-box">

<h1>💌 A Letter From My Heart</h1>

<p>
Something very personal awaits you ❤️
</p>

<input
type="password"
id="letterPasswordInput"
placeholder="Enter Password">

<button onclick="checkLetterPassword()">
Open Letter ❤️
</button>

<p id="letter-error"></p>

</div>

</div>

<!-- Letter Content -->

<div id="letter-content" style="display:none;">

<section class="section">

<h1 class="section-title">
💌 A Letter From My Heart
</h1>

<p class="section-subtitle">
Written only for Kajuuu 🫶🏻❤️
</p>

<div class="love-letter">

YOUR ENTIRE LETTER HERE

</div>

</section>

</div>

<script>

function checkLetterPassword(){

const password =
document.getElementById("letterPasswordInput").value;

if(password === "OnlyKajuuu❤️"){

document.getElementById("letter-password-screen")
.style.display = "none";

document.getElementById("letter-content")
.style.display = "block";

}

else{

document.getElementById("letter-error")
.innerHTML = "Wrong password 😭❤️";

}

}

</script>

</body>
</html>
